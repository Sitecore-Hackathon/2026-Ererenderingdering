# Represents the item template.
type ItemTemplate {
  # The access rights for the current user or for the given user
  access(username: String): ItemTemplateAccess
  # The base templates of the item template.
  baseTemplates(
    after: String
    before: String
    # The flag indicating whether to get direct base templates only.
    directOnly: Boolean = false
    first: PaginationAmount
    last: PaginationAmount
  ): ItemTemplateConnection
  # All field definitions of the item template.
  fields(
    after: String
    before: String
    first: PaginationAmount
    last: PaginationAmount
  ): ItemTemplateFieldConnection
  # The full name of the item template.
  fullName: String!
  # Indicates whether at least one of the specified item templates is a base template.
  hasAnyOfBaseTemplates(templateIds: [ID]!): Boolean!
  # The icon of the item template.
  icon: String
  # The name of the item template.
  name: String!
  # Only own field definitions of the item template.
  ownFields(
    after: String
    before: String
    first: PaginationAmount
    last: PaginationAmount
  ): ItemTemplateFieldConnection
  # The section definitions of the item template.
  sections(
    after: String
    before: String
    first: PaginationAmount
    last: PaginationAmount
  ): ItemTemplateSectionConnection
  # The standard values item created for the item template.
  standardValuesItem(language: String!): Item
  # The globally-unique identifier of the item template.
  templateId(format: IdFormat): ID!
}

